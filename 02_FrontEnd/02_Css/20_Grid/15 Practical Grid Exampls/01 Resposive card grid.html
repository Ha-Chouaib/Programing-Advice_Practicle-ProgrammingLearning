<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Card Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #e16d6d;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%; height: auto;
    }
    .card-content {
      padding: 0.5rem 1rem;
      flex: 1;
    }
    .card-content h3 {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Product Cards</h1>
  <br>
  <div class="grid">
    <div class="card">
      <img src="Products/1.jpg" alt="">
      <div class="card-content">
        <h3>Item 1</h3>
        <p>Short description of product 1.</p>
      </div>
    </div>
    <div class="card">
      <img src="Products/2.jpg" alt="">
      <div class="card-content">
        <h3>Item 2</h3>
        <p>Short description of product 2.</p>
      </div>
    </div>
    <!-- Repeat up to Item 6 -->
    <div class="card">
      <img src="Products/3.jpg" alt="">
      <div class="card-content">
        <h3>Item 3</h3>
        <p>Short description of product 3.</p>
      </div>
    </div>
    <div class="card">
      <img src="Products/4.jpg" alt="">
      <div class="card-content">
        <h3>Item 4</h3>
        <p>Short description of product 4.</p>
      </div>
    </div>
    <div class="card">
      <img src="Products/5.jpg" alt="">
      <div class="card-content">
        <h3>Item 5</h3>
        <p>Short description of product 5.</p>
      </div>
    </div>
    <div class="card">
      <img src="Products/3.jpg" alt="">
      <div class="card-content">
        <h3>Item 6</h3>
        <p>Short description of product 6.</p>
      </div>
    </div>
  </div>
</body>
</html>
