<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Masonry Mosaic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 1rem; }
    .mosaic {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
      grid-auto-rows: 150px;
      grid-auto-flow: dense;
    }
    .mosaic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Span some items for variation */
    .span-2x {
      grid-column: span 2;
      grid-row: span 2;
    }
  </style>
</head>
<body>
  <h1>Masonry-Style Mosaic</h1>
  <div class="mosaic">
    <img src="Images/A1.jpg" class="span-2x" alt="">
    <img src="Images/A2.jpg" alt="">
    <img src="Images/A3.jpg" alt="">
    <img src="Images/A4.jpg" alt="">
    <img src="Images/A5.jpg" class="span-2x" alt="">
    <img src="Images/A6.jpg" alt="">
    <img src="Images/A7.jpg" alt="">
    <img src="Images/A8.jpg" class="span-2x" alt="">
    <img src="Images/A9.jpg" alt="">
    <img src="Images/A10.jpg" alt="">
  </div>
</body>
</html>
