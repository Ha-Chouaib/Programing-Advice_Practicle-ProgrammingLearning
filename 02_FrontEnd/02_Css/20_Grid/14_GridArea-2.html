<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Areas Example 2</title>
  <style>
    .layout {
      display: grid;
      
      grid-template-areas:
        "header header header"
        "sidebar content ads"
        "footer footer footer";
      grid-template-columns: 200px 1fr 150px;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      height: 100vh;
      padding: 1rem;
    }
   
    header  { grid-area: header; background:#369; color:white; padding:1rem; }
    .sidebar{ grid-area: sidebar; background:#9cf; padding:1rem; }
    .content{ grid-area: content; background:#fc9; padding:1rem; overflow:auto; }
    .ads    { grid-area: ads; background:#f99; padding:1rem; }
    footer  { grid-area: footer; background:#636; color:white; padding:1rem; }
  </style>
</head>
<body>
  <div class="layout">
    <header>Header</header>
    <aside class="sidebar">Sidebar</aside>
    <main class="content"><p>Main content scrolls if needed.</p></main>
    <aside class="ads">Ads</aside>
    <footer>Footer</footer>
  </div>
</body>
</html>
