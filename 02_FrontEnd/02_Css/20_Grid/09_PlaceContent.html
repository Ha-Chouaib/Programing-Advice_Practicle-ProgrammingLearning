<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS `place-content: center` Demo</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    .container {
      display: grid;
      /* 2 columns × 2 rows of fixed size */
      grid-template-columns: 100px 100px;
      grid-template-rows:    100px 100px;
      /* create extra space around our 200px×200px grid */
      width: 400px;
      height: 400px;
      border: 2px dashed #666;
      /* CENTER the block of tracks along both axes */
      place-content: center;
      background: #f9f9f9;
      gap: 10px;
      margin: auto; /* center the container in the viewport */
    }
    .item {
      background: #4a90e2;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
    <div class="item">D</div>
  </div>

</body>
</html>
