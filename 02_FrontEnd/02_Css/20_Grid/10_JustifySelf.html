<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Self-Alignment: Simple Example</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: 100px 100px;
      grid-template-rows:    100px 100px;
      gap: 10px;
      background: #eee;
      padding: 10px;
    }
    .grid div {
      background: #4a90e2;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    /* 1) Default stretch */
    /* .default { no self-alignment declared } */

    /* 2) justify-self: end (push right) */
    .right {
      justify-self: end;
      background: #e94c3d;
    }

    /* 3) align-self: end (push bottom) */
    .bottom {
      align-self: end;
      background: #f1c40f;
      color: #333;
    }

    /* 4) place-self: center center */
    .center {
      place-self: center center;
      background: #50e3c2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows:    100px 100px;
      gap: 10px;
      border: 2px solid #666;
    }
    .grid > div {
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #333;
    }

    /* 1) Center Item 1 both axes */
    .item1 {
      place-self: center center;
      background: #4a90e2; color: white;
    }

    /* 2) Right-bottom for Item 2 */
    .item2 {
      justify-self: end;  /* horizontal */
      align-self:   end;  /* vertical */
      background: #e94c3d; color: white;
    }

    /* 3) Stretch vertically, left align for Item 3 */
    .item3 {
      justify-self: start;
      align-self:   stretch;
      background: #f1c40f; color: black;
    }
  </style>
</head>
<body>

  <h1>Simple Self-Alignment Grid</h1>
  <div class="grid">
    <div class="default">Default</div>
    <div class="right">Right</div>
    <div class="bottom">Bottom</div>
    <div class="center">Center</div>
  </div>

  <h1>Self-Alignment in CSS Grid</h1>
  <div class="grid">
    <div class="item1">1</div>
    <div class="item2">2</div>
    <div class="item3">3</div>
    <div>4 (default)</div>
    <div>5 (default)</div>
    <div>6 (default)</div>
  </div>

  <br>
  
  <h2>Flexbox Note (cross-axis only)</h2>
  <div style="display:flex; height:120px; border:2px solid #666; margin-top:1rem;">
    <div style="flex:1; background:#4a90e2; align-self:center; color:white;">A (centered)</div>
    <div style="flex:1; background:#e94c3d; align-self:flex-end; color:white;">B (bottom)</div>
    <div style="flex:1; background:#f1c40f; color:black;">C (stretch/default)</div>
  </div>
</body>
</html>
