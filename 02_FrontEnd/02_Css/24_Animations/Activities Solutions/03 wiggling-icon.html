<!--
  Code Overview: Wiggling Icon Animation
  -------------------------------------------------
  Purpose:
    • Create a “wiggle” effect by rotating an icon back and forth.
  Layout:
    • A single icon centered on the page.
  Use Cases:
    • Indicating draggable handles, attention-drawing icons.
  Key Properties:
    • @keyframes wiggle – rotate from -5° to +5°.
    • animation-direction: alternate; animation-iteration-count: infinite.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wiggling Icon</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      font-family: sans-serif;
    }

    /* Wiggling keyframes */
    @keyframes wiggle {
      from { transform: rotate(0deg); }
      to   { transform: rotate(180deg); }
    }

    .icon {
      font-size: 4rem;
      display: inline-block;
      animation-name: wiggle;
      animation-duration: 0.9s;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      animation-timing-function: ease-in-out;
    }
  </style>
</head>
<body>

  <div class="icon">🔄</div>

</body>
</html>
