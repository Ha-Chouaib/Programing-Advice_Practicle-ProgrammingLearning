<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sliding Panel (Fixed)</title>
  <style>
    /* Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* 1) Trigger Strip – 20px wide, always visible on the left edge */
    .trigger {
      position: fixed;
      top: 0;
      left: 0;
      width: 20px;
      height: 100%;
      z-index: 2;               /* Sit above content so it can receive hover */
      cursor: pointer;
    }

    /* 2) Sidebar – initially off-screen via translateX(-100%) */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100%;
      background: #34495e;
      transform: translateX(-100%);
      transition: transform 0.5s ease;
      z-index: 1;
    }

    /* 3) When the trigger is hovered, slide the sidebar in */
    .trigger:hover + .sidebar {
      transform: translateX(0);
    }

    /* Main content */
    .content {
      margin-left: 20px;        /* account for trigger strip */
      padding: 1rem;
    }
  </style>
</head>
<body>

  <!-- Invisible strip to catch the hover -->
  <div class="trigger" title="Hover here to open menu"></div>

  <!-- The hidden sidebar -->
  <div class="sidebar">
    <h2 style="color:#ecf0f1; padding:1rem; margin:0;">Menu</h2>
    <ul style="list-style:none; padding:1rem; color:#bdc3c7;">
      <li style="margin-bottom:.5rem;">Home</li>
      <li style="margin-bottom:.5rem;">About</li>
      <li>Contact</li>
    </ul>
  </div>

  <!-- Your main page content -->
  <div class="content">
    <h1>Sliding Panel Fixed</h1>
    <p>Move your mouse to the very left edge (over that thin strip) to slide the panel in.</p>
  </div>

</body>
</html>
