<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Saver</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
   
    <div class="container">
         <form action="" class="card">

        <div class="form-item">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="enter your name">
        </div>
        <div class="form-item">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="enter your email">
        </div>
        <div class="form-item color-container">
            <label for="favoritcolor">Favorit color</label>
            <input type="color" id="favorit-color" placeholder="enter your favorit color">
        </div>
    </form>
    <button type="button" id="btn-save" class="custom-btn">Save</button>
    </div>

    <div class="clear-storage">
        <div class="clear-item">
            <input type="text" id="item-to-delete" placeholder="Enter item key">
            <button id="btn-delete-item"> Delete Item</button>
        </div>
        <button id="btn-clear-all">clear All</button>

        <span id="clear-result">deletion msg result</span>
    </div>
    <div class="container ">
        <div class="display-info card">
            <div class="display-item">
            <span class="label">Name</span>
            <span id="display-name" class="value">...</span>

            </div>
            <div class="display-item">
            <span class="label">Email</span>
            <span id="display-email" class="value">...</span>

            </div>
            <div class="display-item">
            <span class="label" >Color</span>
            <span id="display-color" class="value">...</span>
            </div>
        </div>
        <button id="load-data" class="custom-btn">
            load data
        </button>
    </div>
   
</body>
</html>
